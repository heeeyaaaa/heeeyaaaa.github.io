<head>
<meta charset="UTF-8">

<title>Azure / Entra ID Pentest Cheatsheets</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --accent: #58a6ff;
    --accent2: #1f6feb;
    --green: #3fb950;
    --yellow: #d29922;
    --orange: #db6d28;
    --red: #f85149;
    --purple: #bc8cff;
    --cyan: #39d353;
    --code-bg: #161b22;
    --code-border: #30363d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  header h1 span.icon { font-size: 18px; }
  .search-wrap {

    position: relative;
  }
  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px 6px 34px;
    color: var(--text);
    font-size: 13px;

  #search:focus { border-color: var(--accent2); }
  #search::placeholder { color: var(--text3); }
  .search-icon {

    top: 50%;

    color: var(--text3);
    font-size: 13px;
    pointer-events: none;
  }
  #search-count {
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }
  #dl-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  #dl-btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }

  /* ── Layout ── */
  .layout { display: flex; height: calc(100vh - 53px); }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  .sidebar-section {
    padding: 0 8px 8px;
  }
  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 8px;
    margin-bottom: 2px;
  }
  .tab-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: none;
    border: none;
    color: var(--text2);
    text-align: left;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.1s, color 0.1s;

  .tab-btn:hover { background: var(--bg3); color: var(--text); }
  .tab-btn.active { background: var(--accent2); color: #fff; font-weight: 500; }
  .tab-btn .badge {
    margin-left: auto;
    font-size: 10px;
    background: var(--bg3);
    color: var(--text3);
    padding: 1px 6px;
    border-radius: 10px;
    min-width: 20px;
    text-align: center;
  }
  .tab-btn.active .badge { background: rgba(255,255,255,0.2); color: #fff; }

  /* Section nav inside sidebar */
  .section-list { padding: 4px 0 0; }
  .sec-btn {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: var(--text3);
    text-align: left;
    padding: 4px 10px 4px 26px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.1s;
  }
  .sec-btn:hover { color: var(--accent); }

  /* ── Main Content ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Markdown rendering ── */
  .md h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
    margin-bottom: 20px;
  }
  .md h2 {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    margin: 32px 0 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);

  }
  .md h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    margin: 20px 0 8px;
    scroll-margin-top: 20px;
  }
  .md p { margin-bottom: 10px; color: var(--text); }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  .md pre {
    background: var(--code-bg);
    border: 1px solid var(--code-border);
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 10px 0 16px;
    position: relative;

  .md code {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12.5px;
    color: var(--text);
    background: none;
    white-space: pre;
  }
  .md p code, .md li code, .md td code {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 12px;
    color: #f0883e;
  }

  /* Copy button */
  .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s;
  }
  .md pre:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }
  .copy-btn.copied { background: var(--green); color: #000; border-color: var(--green); opacity: 1; }

  /* Language label */
  .lang-label {
    position: absolute;
    top: 8px;
    left: 12px;
    font-size: 10px;
    color: var(--text3);
    font-family: monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .md pre { padding-top: 28px; }

  /* Tables */
  .md table {
    border-collapse: collapse;
    width: 100%;
    margin: 12px 0 20px;
    font-size: 13px;
  }
  .md th {
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
    color: var(--text2);
    font-weight: 600;
    font-size: 12px;
  }
  .md td {
    border: 1px solid var(--border);
    padding: 7px 12px;
    color: var(--text);

  .md tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
  .md tr:hover td { background: rgba(88,166,255,0.05); }

  /* Lists */
  .md ul, .md ol { padding-left: 22px; margin-bottom: 10px; }
  .md li { margin-bottom: 3px; }

  /* Syntax highlighting */
  .kw { color: #ff7b72; }   /* keywords */
  .fn { color: #d2a8ff; }   /* functions/cmdlets */
  .str { color: #a5d6ff; }  /* strings */
  .cm { color: #6e7681; font-style: italic; } /* comments */
  .var { color: #ffa657; }  /* variables */
  .flag { color: #79c0ff; } /* flags/options */
  .op { color: #ff7b72; }   /* operators */

  /* Search highlighting */
  mark {
    background: #f0e68c;
    color: #000;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* Search results */
  .no-results {
    text-align: center;

    color: var(--text3);

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }

  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border); }
</style>

const CONTENT = {};

CONTENT.mgraph = `# Microsoft Graph PowerShell (MGGraph) Cheatsheet

---

## Installation & Setup

\`\`\`powershell
# Install the full SDK
Install-Module Microsoft.Graph -Scope CurrentUser -Force

# Install only specific sub-modules (faster)
Install-Module Microsoft.Graph.Authentication -Scope CurrentUser
Install-Module Microsoft.Graph.Users -Scope CurrentUser
Install-Module Microsoft.Graph.Groups -Scope CurrentUser
Install-Module Microsoft.Graph.Identity.DirectoryManagement -Scope CurrentUser
Install-Module Microsoft.Graph.Applications -Scope CurrentUser
Install-Module Microsoft.Graph.Identity.SignIns -Scope CurrentUser
Install-Module Microsoft.Graph.DeviceManagement -Scope CurrentUser
Install-Module Microsoft.Graph.Reports -Scope CurrentUser

# Update
Update-Module Microsoft.Graph

# Check version
Get-Module Microsoft.Graph* -ListAvailable | Select Name, Version

# List all available commands
Get-Command -Module Microsoft.Graph* | Measure-Object
Get-Command -Module Microsoft.Graph* | Where-Object Name -like "*User*"
\`\`\`

---

## Authentication

\`\`\`powershell
# Interactive login (browser pop-up)
Connect-MgGraph

# With specific scopes
Connect-MgGraph -Scopes "User.Read.All","Group.Read.All","Directory.Read.All"

# With tenant ID (useful for guest/MSP scenarios)
Connect-MgGraph -TenantId "tenant.onmicrosoft.com"

# Device code flow (no browser on current machine)
Connect-MgGraph -UseDeviceCode

# Client credentials (app registration secret)
$ClientSecretCredential = [System.Net.NetworkCredential]::new("", "YOUR_SECRET")
Connect-MgGraph -ClientId "APP_ID" -TenantId "TENANT_ID" -ClientSecretCredential $ClientSecretCredential

# Client credentials via PSCredential object (alternative form)
$SecureClientSecret = ConvertTo-SecureString -String "YOUR_SECRET" -AsPlainText -Force
$ClientSecretCredential = New-Object System.Management.Automation.PSCredential("APP_ID", $SecureClientSecret)
Connect-MgGraph -TenantId "TENANT_ID" -ClientSecretCredential $ClientSecretCredential

# Certificate-based auth
Connect-MgGraph -ClientId "APP_ID" -TenantId "TENANT_ID" -CertificateThumbprint "THUMBPRINT"

# Using existing access token (stolen token)
Connect-MgGraph -AccessToken (ConvertTo-SecureString "eyJ0eXAi..." -AsPlainText -Force)

# Reuse token from active az CLI session
Connect-MgGraph -AccessToken (ConvertTo-SecureString -String (az account get-access-token --resource "https://graph.microsoft.com" --query accessToken -o tsv) -AsPlainText -Force)

# Managed Identity (from Azure VM/Function)
Connect-MgGraph -Identity
Connect-MgGraph -Identity -ClientId "USER_ASSIGNED_MI_CLIENT_ID"

# Check current connection context
Get-MgContext

# Disconnect
Disconnect-MgGraph
\`\`\`

### Common Permission Scopes

| Scope | What it enables |
|-------|----------------|
| \`User.Read.All\` | Read all users |
| \`User.ReadWrite.All\` | Modify all users |
| \`Group.Read.All\` | Read all groups |
| \`Group.ReadWrite.All\` | Modify groups/membership |
| \`Directory.Read.All\` | Read all directory objects |
| \`Directory.ReadWrite.All\` | Full directory write |
| \`RoleManagement.Read.Directory\` | Read role assignments |
| \`RoleManagement.ReadWrite.Directory\` | Assign/remove roles |
| \`Application.Read.All\` | Read apps & service principals |
| \`Application.ReadWrite.All\` | Modify apps, add secrets/certs |
| \`AppRoleAssignment.ReadWrite.All\` | Grant app roles |
| \`Policy.Read.All\` | Read CA policies |
| \`Policy.ReadWrite.ConditionalAccess\` | Modify CA policies |
| \`AuditLog.Read.All\` | Read audit/sign-in logs |
| \`Mail.ReadWrite\` | Read/write mailboxes |
| \`Mail.Send\` | Send email as user |
| \`Files.ReadWrite.All\` | Access all SharePoint/OneDrive |
| \`DeviceManagementManagedDevices.ReadWrite.All\` | Intune device control |

---

## Tenant & Organization Info

\`\`\`powershell
# Tenant details
Get-MgOrganization | Select DisplayName, Id, TenantType, VerifiedDomains

# Verified domains
(Get-MgOrganization).VerifiedDomains

# Tenant ID
(Get-MgContext).TenantId

# Organization contacts (external)
Get-MgContact | Select DisplayName, Mail, ProxyAddresses

# Subscribed SKUs (licenses)
Get-MgSubscribedSku | Select SkuPartNumber, ConsumedUnits, @{N="Total";E={$_.PrepaidUnits.Enabled}}

# Directory settings
Get-MgDirectorySetting | ConvertTo-Json
\`\`\`

---

## Users

\`\`\`powershell
# List all users
Get-MgUser -All

# Specific properties
Get-MgUser -All | Select DisplayName, UserPrincipalName, Id, AccountEnabled, CreatedDateTime, LastPasswordChangeDateTime

# Search by UPN or display name
Get-MgUser -Filter "userPrincipalName eq 'user@domain.com'"
Get-MgUser -Filter "startsWith(displayName,'John')"
Get-MgUser -Search '"displayName:admin"' -ConsistencyLevel eventual

# Get single user by ID or UPN
Get-MgUser -UserId "user@domain.com"
Get-MgUser -UserId "OBJECT-ID"

# All properties for a user
Get-MgUser -UserId "user@domain.com" -Property *

# Guest users only
Get-MgUser -Filter "userType eq 'Guest'" -All

# Disabled accounts
Get-MgUser -Filter "accountEnabled eq false" -All

# High value targets
Get-MgUser -Filter "startsWith(userPrincipalName,'admin')" -All
Get-MgUser -All | Where-Object { $_.DisplayName -match "admin|svc|service|sysadmin|root" }

# Users created recently
Get-MgUser -All | Where-Object { $_.CreatedDateTime -gt (Get-Date).AddDays(-30) }

# User's assigned licenses
Get-MgUserLicenseDetail -UserId "user@domain.com"

# User's manager
Get-MgUserManager -UserId "user@domain.com"

# User's direct reports
Get-MgUserDirectReport -UserId "user@domain.com"

# User's owned objects (apps, groups)
Get-MgUserOwnedObject -UserId "user@domain.com"

# User's registered devices
Get-MgUserRegisteredDevice -UserId "user@domain.com"

# User's OAuth2 permission grants (consented apps)
Get-MgUserOauth2PermissionGrant -UserId "user@domain.com"

# User's app role assignments
Get-MgUserAppRoleAssignment -UserId "user@domain.com"

# Create user
$PasswordProfile = @{ Password = "P@ssw0rd123!"; ForceChangePasswordNextSignIn = $false }
New-MgUser -DisplayName "Test User" -UserPrincipalName "testuser@domain.com" \`
  -AccountEnabled $true -PasswordProfile $PasswordProfile -MailNickname "testuser"

# Update user / reset password
Update-MgUser -UserId "user@domain.com" -PasswordProfile @{ Password = "NewP@ss123!" }

# Enable/disable user
Update-MgUser -UserId "user@domain.com" -AccountEnabled $false
Update-MgUser -UserId "user@domain.com" -AccountEnabled $true

# Delete user
Remove-MgUser -UserId "user@domain.com"

# Restore deleted user (within 30 days)
Restore-MgDirectoryDeletedItem -DirectoryObjectId "OBJECT-ID"

# Permanently delete
Remove-MgDirectoryDeletedItem -DirectoryObjectId "OBJECT-ID"
\`\`\`

---

## Groups

\`\`\`powershell
# All groups
Get-MgGroup -All

# Filter by type
Get-MgGroup -Filter "groupTypes/any(c:c eq 'Unified')" -All   # M365 groups
Get-MgGroup -Filter "securityEnabled eq true" -All            # Security groups
Get-MgGroup -Filter "mailEnabled eq true" -All                # Mail-enabled

# Search
Get-MgGroup -Search '"displayName:IT"' -ConsistencyLevel eventual

# Group members
Get-MgGroupMember -GroupId "GROUP-ID" -All
Get-MgGroupMember -GroupId "GROUP-ID" -All | ForEach-Object {
    Get-MgUser -UserId $_.Id -ErrorAction SilentlyContinue
} | Select DisplayName, UserPrincipalName

# Transitive members (includes nested group members)
Get-MgGroupTransitiveMember -GroupId "GROUP-ID" -All

# Group owners
Get-MgGroupOwner -GroupId "GROUP-ID"

# Groups a user is member of
Get-MgUserMemberOf -UserId "user@domain.com" | Select DisplayName, Id

# Transitive group membership
Get-MgUserTransitiveMemberOf -UserId "user@domain.com"

# Add member to group
New-MgGroupMember -GroupId "GROUP-ID" -DirectoryObjectId "USER-OBJECT-ID"

# Remove member
Remove-MgGroupMemberByRef -GroupId "GROUP-ID" -DirectoryObjectId "USER-OBJECT-ID"

# Add owner
New-MgGroupOwner -GroupId "GROUP-ID" -DirectoryObjectId "USER-OBJECT-ID"

# Create group
New-MgGroup -DisplayName "NewGroup" -MailEnabled $false -SecurityEnabled $true -MailNickname "NewGroup"

# Delete group
Remove-MgGroup -GroupId "GROUP-ID"

# Get group's app role assignments
Get-MgGroupAppRoleAssignment -GroupId "GROUP-ID"
\`\`\`

---

## Directory Roles (Entra ID Roles)

\`\`\`powershell
# List all built-in role templates
Get-MgDirectoryRoleTemplate | Select DisplayName, Id, Description | Sort DisplayName

# List active (instantiated) roles
Get-MgDirectoryRole -All | Select DisplayName, Id, Description

# Get members of a specific role
$role = Get-MgDirectoryRole -Filter "displayName eq 'Global Administrator'"
Get-MgDirectoryRoleMember -DirectoryRoleId $role.Id | ForEach-Object {
    Get-MgUser -UserId $_.Id -ErrorAction SilentlyContinue
} | Select DisplayName, UserPrincipalName, Id

# List members of ALL privileged roles
$privRoles = @("Global Administrator","Privileged Role Administrator","Security Administrator",
               "Exchange Administrator","SharePoint Administrator","Hybrid Identity Administrator",
               "Application Administrator","Cloud Application Administrator","User Administrator",
               "Authentication Administrator","Password Administrator","Global Reader")

foreach ($roleName in $privRoles) {
    $role = Get-MgDirectoryRole -Filter "displayName eq '$roleName'" -ErrorAction SilentlyContinue
    if ($role) {
        $members = Get-MgDirectoryRoleMember -DirectoryRoleId $role.Id -All
        if ($members) {
            Write-Host "\`n[+] $roleName" -ForegroundColor Cyan
            $members | ForEach-Object {
                Get-MgUser -UserId $_.Id -ErrorAction SilentlyContinue
            } | Select DisplayName, UserPrincipalName | Format-Table
        }
    }
}

# Assign role to user
$roleTemplate = Get-MgDirectoryRoleTemplate -Filter "displayName eq 'Global Administrator'"
$role = New-MgDirectoryRole -RoleTemplateId $roleTemplate.Id
New-MgDirectoryRoleMember -DirectoryRoleId $role.Id -DirectoryObjectId "USER-OBJECT-ID"

# Remove role from user
Remove-MgDirectoryRoleMemberByRef -DirectoryRoleId "ROLE-ID" -DirectoryObjectId "USER-OBJECT-ID"

# Role-eligible assignments (PIM)
Get-MgRoleManagementDirectoryRoleAssignment -Filter "principalId eq 'USER-OBJECT-ID'"
Get-MgRoleManagementDirectoryRoleEligibilitySchedule -All

# Active PIM assignments
Get-MgRoleManagementDirectoryRoleAssignmentScheduleInstance -All

# List directory roles assigned to a principal (user or group) — resolves role names
Get-MgRoleManagementDirectoryRoleAssignment -Filter "principalId eq 'PRINCIPAL-ID'" | ForEach-Object {
    $role = Get-MgRoleManagementDirectoryRoleDefinition -UnifiedRoleDefinitionId $_.RoleDefinitionId
    Write-Host "$($role.DisplayName) -> Scope: $($_.DirectoryScopeId)"
}

# Assign Global Administrator (requires RoleManagement.ReadWrite.Directory)
$userId = az ad user show --id "user@domain.com" --query id -o tsv
$body = @{
    principalId      = $userId
    roleDefinitionId = "62e90394-69f5-4237-9190-012177145e10"   # Global Administrator
    directoryScopeId = "/"
} | ConvertTo-Json
$body | Out-File "$env:TEMP\roleassign.json" -Encoding utf8
az rest --method POST \`
  --url "https://graph.microsoft.com/v1.0/roleManagement/directory/roleAssignments" \`
  --headers "Content-Type=application/json" \`
  --body "@$env:TEMP\roleassign.json"
\`\`\`

---

## Applications & Service Principals

\`\`\`powershell
# List all app registrations
Get-MgApplication -All | Select DisplayName, AppId, Id, CreatedDateTime

# List all service principals (enterprise apps)
Get-MgServicePrincipal -All | Select DisplayName, AppId, Id, ServicePrincipalType

# Get app by display name
Get-MgApplication -Filter "displayName eq 'MyApp'"
Get-MgServicePrincipal -Filter "displayName eq 'MyApp'"

# Apps with credentials (secrets/certs)
Get-MgApplication -All | Where-Object { $_.PasswordCredentials -or $_.KeyCredentials } |
    Select DisplayName, AppId, @{N="Secrets";E={$_.PasswordCredentials.Count}}, @{N="Certs";E={$_.KeyCredentials.Count}}

# Secret metadata
$app = Get-MgApplication -Filter "displayName eq 'MyApp'"
$app.PasswordCredentials | Select DisplayName, KeyId, StartDateTime, EndDateTime

# Add a new secret to an app
$app = Get-MgApplication -Filter "displayName eq 'TargetApp'"
$secret = Add-MgApplicationPassword -ApplicationId $app.Id -PasswordCredential @{
    DisplayName = "Backup Key"
    EndDateTime = (Get-Date).AddYears(2)
}
Write-Host "NEW SECRET: $($secret.SecretText)"  # Only shown once!

# Add secret to service principal
$sp = Get-MgServicePrincipal -Filter "displayName eq 'TargetApp'"
$secret = Add-MgServicePrincipalPassword -ServicePrincipalId $sp.Id -PasswordCredential @{
    DisplayName = "Backup Key"
    EndDateTime = (Get-Date).AddYears(2)
}

# Remove a secret
Remove-MgApplicationPassword -ApplicationId "APP-OBJECT-ID" -KeyId "KEY-ID"

# Add certificate to app
$certBytes = [System.IO.File]::ReadAllBytes("C:\cert.cer")
Update-MgApplication -ApplicationId "APP-OBJECT-ID" -KeyCredentials @{
    Type = "AsymmetricX509Cert"; Usage = "Verify"; Key = $certBytes

// ── Markdown Parser ───────────────────────────────────────────────────────────

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function syntaxHighlight(code, lang) {
  // Use NUL-byte placeholders so regex passes don't corrupt each other's span tags.
  // Order: protect strings → protect comments → apply everything else → flush placeholders.
  const P = '\x00'; // placeholder delimiter (never appears in code)
  const slots = [];
  function protect(html) { slots.push(html); return P + (slots.length - 1) + P; }
  function flush(s) { return s.replace(/\x00(\d+)\x00/g, (_, i) => slots[+i]); }

  let s = escapeHtml(code);

  if (lang === 'powershell' || lang === 'ps1') {
    // 1. Strings (highest priority — protect before anything else touches them)
    s = s.replace(/(["'])([^"'\n]*)\1/g, m => protect(`<span class="str">${m}</span>`));
    // 2. Comments (rest of line after #, only when not inside a string placeholder)
    s = s.split('\n').map(line => {
      const ci = line.indexOf('#');
      if (ci === -1) return line;
      // make sure # isn't inside a protected slot
      const before = line.slice(0, ci);
      if ((before.match(/\x00/g) || []).length % 2 !== 0) return line; // inside slot
      return before + protect(`<span class="cm">${line.slice(ci)}</span>`);
    }).join('\n');
    // 3. Cmdlet functions (Get-Foo style)
    s = s.replace(/\b((?:Get|Set|New|Remove|Add|Update|Invoke|Connect|Disconnect|Export|Import|Install|Uninstall|Enable|Disable|Read|Write|Restore|ConvertTo|ConvertFrom|Out|ForEach|Sort|Group|Measure|Format|Test|Copy|Move|Send|Receive|Start|Stop|Restart|Publish|Register|Unregister|Clear|Rename|Wait|Watch|Show|Hide|Open|Close|Join|Split)-[\w-]+)/g,
      m => protect(`<span class="fn">${m}</span>`));
    // 4. Variables
    s = s.replace(/(\$[\w]+)/g, m => protect(`<span class="var">${m}</span>`));
    // 5. Flags
    s = s.replace(/([ \t])(-[A-Za-z][\w]*)/g, (_, sp, flag) => sp + protect(`<span class="flag">${flag}</span>`));
    // 6. Keywords
    s = s.replace(/\b(if|else|elseif|foreach|for|while|do|switch|try|catch|finally|return|break|continue|function|param|begin|process|end)\b/gi,
      m => protect(`<span class="kw">${m}</span>`));

  } else if (lang === 'bash' || lang === 'sh') {
    s = s.replace(/(["'])([^"'\n]*)\1/g, m => protect(`<span class="str">${m}</span>`));
    s = s.split('\n').map(line => {
      const ci = line.indexOf('#');
      if (ci === -1) return line;
      const before = line.slice(0, ci);
      if ((before.match(/\x00/g) || []).length % 2 !== 0) return line;
      return before + protect(`<span class="cm">${line.slice(ci)}</span>`);
    }).join('\n');
    s = s.replace(/\b(az|curl|python3|pip3?|git|docker|sqlite3|wget|unzip|roadrecon|roadtx|o365spray)\b/g,
      m => protect(`<span class="fn">${m}</span>`));
    s = s.replace(/(\$[\w{]+}?)/g, m => protect(`<span class="var">${m}</span>`));
    s = s.replace(/([ \t])(--[\w-]+=?|-[a-zA-Z]\b)/g, (_, sp, flag) => sp + protect(`<span class="flag">${flag}</span>`));
    s = s.replace(/\b(if|then|else|elif|fi|for|while|do|done|case|esac|in|function|return|export|local|source|echo|printf|exit|break|continue)\b/g,
      m => protect(`<span class="kw">${m}</span>`));

  } else if (lang === 'cypher') {
    s = s.replace(/(["'])([^"'\n]*)\1/g, m => protect(`<span class="str">${m}</span>`));
    s = s.replace(/(--[^\n]*)/g, m => protect(`<span class="cm">${m}</span>`));
    s = s.replace(/\b(MATCH|WHERE|RETURN|WITH|AS|LIMIT|ORDER|BY|CREATE|MERGE|SET|DELETE|DETACH|OPTIONAL|UNION|CALL|YIELD)\b/g,
      m => protect(`<span class="kw">${m}</span>`));
  }

  return flush(s);
}

function parseMarkdown(md, tabPrefix) {
  const lines = md.split('\n');
  let html = '';
  let inCode = false, codeLang = '', codeLines = [];
  let inTable = false, tableLines = [];

  function flushTable() {
    if (!tableLines.length) return;
    let t = '<table>';
    tableLines.forEach((row, i) => {
      const cells = row.split('|').filter((c,ci,a) => ci>0 && ci<a.length-1).map(c => c.trim());
      if (i === 1) { tableLines.splice(1,1); return; } // skip separator
      const tag = i === 0 ? 'th' : 'td';
      t += '<tr>' + cells.map(c => `<${tag}>${inlineFormat(c)}</${tag}>`).join('') + '</tr>';
    });
    t += '</table>';
    html += t;
    tableLines = [];
    inTable = false;
  }

  function inlineFormat(s) {
    return s
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>');
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (line.startsWith('```')) {
      if (!inCode) {
        inCode = true;
        codeLang = line.slice(3).trim().toLowerCase();
        codeLines = [];
        if (inTable) flushTable();
      } else {
        const highlighted = syntaxHighlight(codeLines.join('\n'), codeLang);
        html += `<pre><span class="lang-label">${codeLang||'code'}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button><code>${highlighted}</code></pre>`;
        inCode = false;
        codeLang = '';
        codeLines = [];
      }
      continue;
    }
    if (inCode) { codeLines.push(line); continue; }

    // Table
    if (line.startsWith('|')) {
      inTable = true;
      tableLines.push(line);
      continue;
    } else if (inTable) {
      flushTable();
    }

    if (line.startsWith('# ')) {
      html += `<h1>${inlineFormat(escapeHtml(line.slice(2)))}</h1>`;
    } else if (line.startsWith('## ')) {
      const id = tabPrefix + '-' + line.slice(3).toLowerCase().replace(/[^a-z0-9]+/g,'-');
      html += `<h2 id="${id}">${inlineFormat(escapeHtml(line.slice(3)))}</h2>`;
    } else if (line.startsWith('### ')) {
      const id = tabPrefix + '-' + line.slice(4).toLowerCase().replace(/[^a-z0-9]+/g,'-');
      html += `<h3 id="${id}">${inlineFormat(escapeHtml(line.slice(4)))}</h3>`;
    } else if (line.startsWith('---')) {
      html += '<hr>';
    } else if (line.match(/^[*-] /)) {
      html += `<ul><li>${inlineFormat(escapeHtml(line.slice(2)))}</li></ul>`;
    } else if (line.trim() === '') {
      // skip
    } else {
      html += `<p>${inlineFormat(escapeHtml(line))}</p>`;
    }
  }
  if (inTable) flushTable();
  return html;
}

// ── Init ─────────────────────────────────────────────────────────────────────

const TABS = ['mgraph','azcli','aadinternals','misc'];
const RENDERED = {};

function render() {
  TABS.forEach(tab => {
    const el = document.getElementById('panel-' + tab);
    RENDERED[tab] = parseMarkdown(CONTENT[tab], tab);
    el.innerHTML = RENDERED[tab];
  });
}

function buildSectionNav(tab) {
  const panel = document.getElementById('panel-' + tab);
  const headings = panel.querySelectorAll('h2, h3');
  let nav = '';
  headings.forEach(h => {
    const indent = h.tagName === 'H3' ? 'padding-left:36px' : '';
    nav += `<button class="sec-btn" style="${indent}" onclick="scrollToSection('${h.id}')">${h.textContent}</button>`;
  });
  document.getElementById('section-nav').innerHTML = nav
    ? `<div class="sidebar-label" style="margin-top:8px">Sections</div><div class="section-list">${nav}</div>`
    : '';
}

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

let activeTab = 'mgraph';
function switchTab(tab) {
  TABS.forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
    document.getElementById('btn-' + t).classList.toggle('active', t === tab);
  });
  activeTab = tab;
  buildSectionNav(tab);
  document.getElementById('search').dispatchEvent(new Event('input'));
  document.getElementById('main-content').scrollTop = 0;
}

function copyCode(btn) {
  const code = btn.nextElementSibling.textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// ── Search ───────────────────────────────────────────────────────────────────

let searchTimeout;
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => doSearch(this.value.trim()), 150);
});

function doSearch(q) {
  const panel = document.getElementById('panel-' + activeTab);
  const countEl = document.getElementById('search-count');

  if (!q) {
    panel.innerHTML = RENDERED[activeTab];
    countEl.textContent = '';
    reattachCopyButtons();
    return;
  }

  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(${escaped})`, 'gi');

  // Count matches in raw text
  const matches = (CONTENT[activeTab].match(re) || []).length;
  countEl.textContent = matches ? `${matches} matches` : 'No matches';

  // Highlight in rendered HTML (text nodes only)
  const tmp = document.createElement('div');
  tmp.innerHTML = RENDERED[activeTab];
  highlightTextNodes(tmp, re);
  panel.innerHTML = tmp.innerHTML;
  reattachCopyButtons();

  // Scroll to first match
  const first = panel.querySelector('mark');
  if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function highlightTextNodes(node, re) {
  if (node.nodeType === 3) {
    if (re.test(node.textContent)) {
      const span = document.createElement('span');
      span.innerHTML = node.textContent.replace(re, '<mark>$1</mark>');
      node.parentNode.replaceChild(span, node);
      return;
    }
  } else if (node.tagName !== 'SCRIPT' && node.tagName !== 'STYLE') {
    Array.from(node.childNodes).forEach(child => highlightTextNodes(child, re));
  }
}

function reattachCopyButtons() {
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.onclick = function() { copyCode(this); };
  });
}

// ── Download ─────────────────────────────────────────────────────────────────

const TAB_NAMES = {
  mgraph: 'mgraph_cheatsheet.md',
  azcli: 'azcli_cheatsheet.md',
  aadinternals: 'aadinternals_cheatsheet.md',
  misc: 'azure_misc_tools_cheatsheet.md'
};

function downloadCurrent() {
  const content = CONTENT[activeTab];
  const filename = TAB_NAMES[activeTab];
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  const btn = document.getElementById('dl-btn');
  btn.textContent = '✓ Saved';
  setTimeout(() => { btn.textContent = '⬇ Download'; }, 1500);
}

// ── Start ────────────────────────────────────────────────────────────────────

render();
buildSectionNav('mgraph');
reattachCopyButtons();
</script>
